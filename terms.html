.card{background:var(--wh);border:1px solid var(--gl);border-radius:var(--r);box-shadow:var(--sh);padding:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:20px 0 70px}.grid .card h3{margin:0 0 8px;color:var(--m);font-family:var(--ff);font-size:1.4rem}.grid .card p,.grid .card li{color:var(--ch2);font-size:.93rem}.grid ul{margin:0;padding-left:18px}.section{padding:20px 0 70px}.section h2{font-family:var(--ff);font-size:2rem;margin:0 0 12px;color:var(--m)}.section p{max-width:75ch;color:var(--ch2)}.footer{border-top:1px solid var(--gl);padding:28px 0 40px;color:var(--ch2);font-size:.9rem}
